<div class="container">
	<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="p-4 shadow rounded bg-white">

		<div class="row">
		
			<div class="col-md-6 mb-3">
				<label>Current Password</label>
                <div class="input-wrapper">
                    <input 
                        #currentPassword
                        type="password" 
                        class="form-control" 
                        formControlName="currentPassword" />
                        
                    <i 
                        class="bi" 
                        [class]="currentPassword.type === 'password' ? 'bi-eye-slash' : 'bi-eye'"
                        (click)="currentPassword.type = currentPassword.type === 'password' ? 'text' : 'password'">
                    </i>
                </div>
			</div>

			<div class="col-md-6 mb-3">
				<label>New Password</label>
                <div class="input-wrapper">
                    <input 
                        #newPassword
                        type="password" 
                        class="form-control" 
                        formControlName="newPassword" />
                        
                    <i 
                        class="bi" 
                        [class]="newPassword.type === 'password' ? 'bi-eye-slash' : 'bi-eye'"
                        (click)="newPassword.type = newPassword.type === 'password' ? 'text' : 'password'">
                    </i>
                </div>
			</div>

			<div class="col-md-6 mb-3">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input 
                        #confirmPassword
                        type="password" 
                        class="form-control" 
                        formControlName="confirmPassword" />
                        
                    <i 
                        class="bi" 
                        [class]="confirmPassword.type === 'password' ? 'bi-eye-slash' : 'bi-eye'"
                        (click)="confirmPassword.type = confirmPassword.type === 'password' ? 'text' : 'password'">
                    </i>
                </div>
            </div>

		</div>

		<button type="submit" class="btn btn-primary mt-3" >
			Reset Password
		</button>

	</form>
</div>
