<div class="d-flex justify-content-start mb-3">
    <button type="button" class="btn btn-primary" (click)="openAddCompanyModal()">Add Company</button>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-light">
            <tr>
                <th scope="col">Company Name</th>
                <th scope="col">Address</th>
                <th scope="col">Phone Number</th>
                <th scope="col" class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            @if (isLoading()) {
                <tr>
                    <td colspan="4" class="text-center">Loading companies...</td>
                </tr>
            } @else if (companies().length === 0) {
                <tr>
                    <td colspan="4" class="text-center">No companies found.</td>
                </tr>
            } @else {
                @for (company of companies(); track company.id) {
                    <tr>
                        <td>{{ company.name }}</td>
                        <td>{{ company.country }}</td>
                        <td>{{ company.establishedDate }}</td>
                        <td class="text-center">
                            <div ngbDropdown container="body" class="d-inline-block">
                                <button 
                                    class="btn btn-link text-secondary p-0 border-0" 
                                    type="button"
                                    ngbDropdownToggle>
                                    <i class="bi bi-three-dots-vertical fs-5"></i>
                                </button>
                                
                                <div ngbDropdownMenu class="shadow-sm">
                                    <!-- Future actions for each company can be added here -->
                                    <!-- Example: Edit Company, View Details, etc. -->
                                </div>
                            </div>
                        </td>
                    </tr>
                }
            }
        </tbody>
    </table>
</div>
