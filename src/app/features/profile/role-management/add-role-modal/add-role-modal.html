<form [formGroup]="form" (ngSubmit)="submit()">
    <div class="modal-header">
      <h5 class="modal-title">Add Role</h5>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="activeModal.dismiss('cancel')"
      ></button>
    </div>
  
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-12">
          <div class="row align-items-center">
            <label class="form-label col-3 col-form-label mb-0">Name</label>
            <div class="col-9">
              <input type="text" class="form-control" formControlName="name" />
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="row align-items-center">
            <label class="form-label col-3 col-form-label mb-0">Description</label>
            <div class="col-9">
              <input type="text" class="form-control" formControlName="description" />
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-secondary"
        (click)="activeModal.dismiss('cancel')"
        [disabled]="isSubmitting()"
      >
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting() || form.invalid">
        Save
      </button>
    </div>
  </form>
