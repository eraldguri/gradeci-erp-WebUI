<div class="modal-header">
	<h5 class="modal-title">Permission Management</h5>
	<button
		type="button"
		class="btn-close"
		aria-label="Close"
		(click)="activeModal.dismiss('cancel')">
	</button>
</div>

<ul class="nav nav-tabs custom-tabs border-bottom-0">
    @for (tab of tabs(); track tab.id) {
        <li class="nav-item">
            <button
                class="nav-link d-flex align-items-center gap-2 px-4 py-3"
                [class.active]="activeTabId() === tab.id"
                (click)="activeTabId.set(tab.id)">
                <span>{{ tab.label }}</span>

                <span class="badge rounded-pill border" [class]="getBadgeClass(tab.badge)">
                    {{ tab.badge }}
                </span>
            </button>
        </li>
    }
</ul>

<div class="tab-content border rounded shadow-sm bg-white">
    @for (tab of tabs(); track tab.id) {
        
        @if (activeTabId() === tab.id) {
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Description</th>
                                <th scope="col" class="text-center">Is Selected</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (permission of tab?.permissions; track permission.name) {
                                <tr>
                                    <td>{{ permission.name }}</td>
                                    <td>{{ permission.description }}</td>
                                    <td class="text-center align-middle">
                                        <label class="switch m-0">
                                            <input type="checkbox" [checked]="permission.assigned" />
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div> 
        }
    }
</div>
