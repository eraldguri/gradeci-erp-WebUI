<div class="d-flex justify-content-start mb-3">
    <button type="button" class="btn btn-primary" (click)="addRole()">Add Role</button>
</div>

<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-light">
            <tr>
                <th scope="col">Role Name</th>
                <th scope="col">Description</th>
                <th scope="col" class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            @if (isLoading()) {
                <tr>
                    <td colspan="7" class="text-center">Loading roles...</td>
                </tr>
            } @else if (roles().length === 0) {
                <tr>
                    <td colspan="7" class="text-center">No roles found.</td>
                </tr>
            } @else {
                @for (role of roles(); track role.id) {
                    <tr>
                        <td>{{ role.name }}</td>
                        <td>{{ role.description }}</td>
                        <td class="text-center">
                            <div ngbDropdown container="body" class="d-inline-block">
                                <button 
                                    class="btn btn-link text-secondary p-0 border-0" 
                                    type="button"
                                    ngbDropdownToggle>
                                    <i class="bi bi-three-dots-vertical fs-5"></i>
                                </button>
                                
                               <div ngbDropdownMenu class="shadow-sm">
                                    <button ngbDropdownItem (click)="viewPermissions(role.id)">
                                        <i class="bi bi-eye me-2"></i> Permissions
                                    </button>

                                    <button ngbDropdownItem>
                                        <i class="bi bi-pencil me-2"></i> Update Role
                                    </button>
                                    
                                    <button ngbDropdownItem (click)="openDeleteRoleDialog(role.id, role.name)">
                                        <i class="bi bi-trash me-2"></i> Delete Role
                                    </button>

                               </div>
                            </div>
                        </td>
                    </tr>
                }
            }
        </tbody>
    </table>
</div>
