<form [formGroup]="form" (ngSubmit)="submit()">
  <div class="modal-header">
    <h5 class="modal-title">Register User</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="activeModal.dismiss('cancel')"
    ></button>
  </div>

  <div class="modal-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" formControlName="firstName" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" formControlName="lastName" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone Number</label>
        <input type="number" class="form-control" formControlName="phoneNumber" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" formControlName="confirmPassword" />
      </div>

      <div class="col-12">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            formControlName="isActive"
            id="userIsActive"
          />
          <label class="form-check-label" for="userIsActive">Active</label>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="activeModal.dismiss('cancel')"
      [disabled]="isSubmitting()"
    >
      Cancel
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="isSubmitting() || form.invalid">
      Save
    </button>
  </div>
</form>
