<nav class="navbar navbar-light bg-white border-bottom px-3">
  <button class="btn btn-outline-secondary me-3" (click)="toggleSidebar.emit()">
    ☰
  </button>

  <span class="fw-semibold">ERP System</span>

  <div class="ms-auto d-flex align-items-center gap-3">
    @if (notifications > 0) {
      <span class="badge bg-danger">
        {{notifications}}
      </span>
    }

    <div class="dropdown" ngbDropdown>

      <button class="btn btn-light dropdown-toggle" ngbDropdownToggle type="button">
        {{ userData?.name }}
      </button>

      <ul class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
        @for (item of menu; track $index) {
          <li>
            <a class="dropdown-item" style="cursor: pointer;" (click)="onUserDropdownItemClick(item.route)">{{item.title}}</a>
          </li>
        }
      </ul>

    </div>
  </div>
</nav>
